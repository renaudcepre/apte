name: Publish to PyPI

# -----------------------------------------------------------------------------
# Publishes apte to PyPI via Trusted Publishing (OIDC, no stored API token).
# PyPI Trusted Publisher: owner=renaudcepre, repo=apte, workflow=publish.yml.
# Fires on every published GitHub release (release-please cuts these) and can
# also be run manually.
# -----------------------------------------------------------------------------

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/apte
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing - no API token stored
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
